<script>
const video = document.getElementById('splash');

function playFromStart() {
  video.pause();
  video.currentTime = 0;
  const p = video.play();
  if (p && typeof p.catch === 'function') p.catch(() => {});
}

video.addEventListener('ended', () => {
  window.dispatchEvent(new Event('splash:done'));
  window.parent?.postMessage({ type: 'coastal-splash:done' }, '*');
});

document.body.addEventListener('click', playFromStart);

// Autoplay immediately. Because it is muted + playsinline, browsers allow it.
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', playFromStart, { once: true });
} else {
  playFromStart();
}
</script>
